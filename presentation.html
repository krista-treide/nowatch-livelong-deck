<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NOWATCH USA — GTM 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#111;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif}

/* ── TOP BAR ── */
.topbar{
  position:fixed;
  top:0;left:0;right:0;
  height:40px;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:400;
}
.topbar-brand{
  position:absolute;
  left:20px;
  font-size:8px;
  letter-spacing:3.5px;
  text-transform:uppercase;
  color:rgba(255,255,255,0.18);
  pointer-events:none;
}
.slide-nums{
  display:flex;
  align-items:center;
  gap:2px;
}
.snum{
  font-size:8.5px;
  letter-spacing:0.5px;
  color:rgba(255,255,255,0.2);
  padding:5px 7px;
  cursor:pointer;
  border-radius:3px;
  transition:color 0.18s;
  font-weight:400;
  line-height:1;
  user-select:none;
}
.snum:hover{color:rgba(255,255,255,0.55)}
.snum.active{
  color:#EEFF00;
  font-weight:700;
}

/* ── DECK ── */
.deck{
  position:fixed;
  top:40px;left:0;right:0;bottom:0;
  overflow:hidden;
  background:#111;
}

.slide{
  position:absolute;
  inset:16px;
  display:none;
  align-items:center;
  justify-content:center;
  background:#111;
}

/* ── SLIDE INNER — sized by JS to match rendered image exactly ── */
.slide-inner{
  position:relative;
  flex-shrink:0;
}

.slide-inner img{
  width:100%;
  height:100%;
  display:block;
  user-select:none;
  -webkit-user-drag:none;
}

/* ── EYEBROW OVERLAY ── */
.eyebrow-mask{
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:2.8%;
  background:#fff;
  pointer-events:none;
}

.eyebrow{
  position:absolute;
  top:1.1%;
  left:3.2%;
  font-family:Arial,Helvetica,sans-serif;
  font-size:max(7px,0.45vw);
  font-weight:700;
  letter-spacing:0.22em;
  text-transform:uppercase;
  color:#999;
  white-space:nowrap;
  pointer-events:none;
  line-height:1;
}

/* ── EVENTS IFRAME ── */
.events-slide iframe{
  width:1600px;
  height:900px;
  border:none;
  flex-shrink:0;
  transform-origin:center center;
  display:block;
}

/* ── DOWN ARROW ── */
.down-arrow{
  position:fixed;
  bottom:3px;
  left:50%;
  transform:translateX(-50%);
  background:none;
  border:none;
  cursor:pointer;
  color:rgba(255,255,255,0.22);
  font-size:13px;
  line-height:1;
  padding:3px 14px;
  z-index:200;
  outline:none;
  transition:color 0.15s,opacity 0.18s;
  user-select:none;
}
.down-arrow:hover{color:rgba(255,255,255,0.55)}
.down-arrow.hidden{opacity:0;pointer-events:none}
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-brand">NOWATCH USA</span>
  <div class="slide-nums" id="slideNums"></div>
</div>

<div class="deck" id="deck"></div>
<button class="down-arrow" id="downArrow" aria-label="Next" onclick="navigate(1)">&#8595;</button>

<script>
const SLIDE_RATIO = 2376 / 1375;

const SLIDES = [
  {type:'image',src:'slides/slide-01.png'},
  {type:'image',src:'slides/slide-02.png',eyebrow:'01   WHERE WE STAND'},
  {type:'image',src:'slides/slide-03.png',eyebrow:'02   PHILOSOPHY & POSITIONING'},
  {type:'image',src:'slides/slide-04.png',eyebrow:'03   TARGET AUDIENCES — USA GTM'},
  {type:'image',src:'slides/slide-05.png',eyebrow:'04   COMPETITIVE POSITIONING'},
  {type:'image',src:'slides/slide-06.png',eyebrow:'05   BIOMARKER ARCHITECTURE'},
  {type:'image',src:'slides/slide-07.png',eyebrow:'06   EARNED MEDIA STRATEGY'},
  {type:'image',src:'slides/slide-08.png',eyebrow:'07   EVENTS STRATEGY'},
  {type:'image',src:'slides/slide-09.png',eyebrow:'08   USA MARKET RATIONALE'},
  {type:'image',src:'slides/slide-10.png',eyebrow:'09   BOUTIQUE RETAIL & PREMIUM B2B'},
  {type:'image',src:'slides/slide-11.png',eyebrow:'10   PRODUCT LADDER'},
  {type:'image',src:'slides/slide-12.png',eyebrow:'11   PRIORITY PILLARS'},
  {type:'image',src:'slides/slide-13.png',eyebrow:'12   CHANNEL STRATEGY'},
  {type:'image',src:'slides/slide-14.png',eyebrow:'13   USA SUCCESS METRICS'},
  {type:'image',src:'slides/slide-15.png',eyebrow:'14   FROM FOUNDATION TO STRATEGY'},
  {type:'events'},
  {type:'image',src:'slides/slide-16.png',eyebrow:'16   INTEGRATED CHANNEL OVERVIEW'},
  {type:'image',src:'slides/slide-17.png',eyebrow:'17   USA MARKET STRATEGY'},
  {type:'image',src:'slides/slide-18.png'}
];

const TOTAL = SLIDES.length;
let current = 0;
let animating = false;
const deck = document.getElementById('deck');
const slideNumsEl = document.getElementById('slideNums');

// Build slide elements
const slideEls = SLIDES.map((def, i) => {
  const div = document.createElement('div');
  div.className = 'slide';
  if (def.type === 'events') div.classList.add('events-slide');

  if (def.type === 'image') {
    const inner = document.createElement('div');
    inner.className = 'slide-inner';

    const img = document.createElement('img');
    img.src = def.src;
    img.loading = i < 4 ? 'eager' : 'lazy';
    img.alt = '';
    inner.appendChild(img);

    if (def.eyebrow) {
      const mask = document.createElement('div');
      mask.className = 'eyebrow-mask';
      inner.appendChild(mask);

      const eye = document.createElement('div');
      eye.className = 'eyebrow';
      eye.textContent = def.eyebrow;
      inner.appendChild(eye);
    }

    div.appendChild(inner);
  } else {
    const iframe = document.createElement('iframe');
    iframe.src = 'events-timeline.html';
    iframe.scrolling = 'no';
    iframe.setAttribute('frameborder', '0');
    iframe.id = 'events-frame';
    div.appendChild(iframe);
  }

  deck.appendChild(div);
  return div;
});

// Show first slide immediately
slideEls[0].style.display = 'flex';
slideEls[0].style.opacity = '1';

// Build slide number indicators
for (let i = 0; i < TOTAL; i++) {
  const span = document.createElement('span');
  span.className = 'snum' + (i === 0 ? ' active' : '');
  span.textContent = String(i + 1).padStart(2, '0');
  span.title = 'Slide ' + (i + 1) + ' of ' + TOTAL;
  span.addEventListener('click', () => jumpTo(i));
  slideNumsEl.appendChild(span);
}

// Size .slide-inner to match the rendered image exactly
function resizeSlideInners() {
  const avW = window.innerWidth - 32;
  const avH = window.innerHeight - 40 - 32;
  let innerW, innerH;
  if (avW / avH > SLIDE_RATIO) {
    innerH = avH;
    innerW = avH * SLIDE_RATIO;
  } else {
    innerW = avW;
    innerH = avW / SLIDE_RATIO;
  }
  document.querySelectorAll('.slide-inner').forEach(el => {
    el.style.width  = innerW + 'px';
    el.style.height = innerH + 'px';
  });
}

// Scale events iframe to fit deck area
function scaleEventsFrame() {
  const frame = document.getElementById('events-frame');
  if (!frame) return;
  const avW = window.innerWidth - 32;
  const avH = window.innerHeight - 40 - 32;
  const scale = Math.min(avW / 1600, avH / 900);
  frame.style.transform = 'scale(' + scale + ')';
}

window.addEventListener('resize', () => {
  resizeSlideInners();
  scaleEventsFrame();
});

// Transition: rise from bottom + dissolve
function transition(fromIdx, toIdx) {
  if (animating) return;
  animating = true;

  const leaving = slideEls[fromIdx];
  const entering = slideEls[toIdx];

  entering.style.transition = 'none';
  entering.style.transform = 'translateY(28px)';
  entering.style.opacity = '0';
  entering.style.display = 'flex';

  entering.getBoundingClientRect();

  entering.style.transition = 'transform 0.30s cubic-bezier(0.0,0.0,0.2,1), opacity 0.26s ease';
  leaving.style.transition  = 'opacity 0.20s ease';

  entering.style.transform = 'translateY(0)';
  entering.style.opacity   = '1';
  leaving.style.opacity    = '0';

  setTimeout(() => {
    leaving.style.display    = 'none';
    leaving.style.opacity    = '';
    leaving.style.transition = '';
    animating = false;
    if (SLIDES[toIdx].type === 'events') scaleEventsFrame();
  }, 320);
}

function navigate(dir) {
  const next = current + dir;
  if (next < 0 || next >= TOTAL || animating) return;
  transition(current, next);
  current = next;
  updateUI();
}

function jumpTo(idx) {
  if (idx === current || animating) return;
  transition(current, idx);
  current = idx;
  updateUI();
}

function updateUI() {
  document.getElementById('downArrow').className = 'down-arrow' + (current === TOTAL - 1 ? ' hidden' : '');
  slideNumsEl.querySelectorAll('.snum').forEach((el, i) => {
    el.className = 'snum' + (i === current ? ' active' : '');
  });
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
    e.preventDefault(); navigate(1);
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault(); navigate(-1);
  } else if (e.key === 'f' || e.key === 'F') {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }
});

// Swipe support
let touchStartY = 0;
deck.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, {passive:true});
deck.addEventListener('touchend', e => {
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dy) > 50) navigate(dy < 0 ? 1 : -1);
});

updateUI();
resizeSlideInners();
scaleEventsFrame();
</script>
</body>
</html>
