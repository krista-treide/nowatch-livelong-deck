<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NOWATCH USA — GTM 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#111;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif}

/* ── TOP BAR ── */
.topbar{
  position:fixed;
  top:0;left:0;right:0;
  height:40px;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:400;
}
.topbar-brand{
  position:absolute;
  left:20px;
  font-size:8px;
  letter-spacing:3.5px;
  text-transform:uppercase;
  color:rgba(255,255,255,0.18);
  pointer-events:none;
}
.slide-nums{
  display:flex;
  align-items:center;
  gap:2px;
}
.snum{
  font-size:8.5px;
  letter-spacing:0.5px;
  color:rgba(255,255,255,0.2);
  padding:5px 7px;
  cursor:pointer;
  border-radius:3px;
  transition:color 0.18s;
  font-weight:400;
  line-height:1;
  user-select:none;
}
.snum:hover{color:rgba(255,255,255,0.55)}
.snum.active{
  color:#EEFF00;
  font-weight:700;
}

/* ── DECK ── */
.deck{
  position:fixed;
  top:40px;left:0;right:0;bottom:0;
  overflow:hidden;
  background:#111;
}

.slide{
  position:absolute;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:#111;
}

.slide img{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
  display:block;
  user-select:none;
  -webkit-user-drag:none;
}

.events-slide iframe{
  width:1600px;
  height:900px;
  border:none;
  flex-shrink:0;
  transform-origin:center center;
  display:block;
}

/* ── NAV ARROWS ── */
.nav-btn{
  position:fixed;
  top:calc(50% + 20px);
  transform:translateY(-50%);
  width:40px;
  height:68px;
  background:rgba(0,0,0,0.28);
  border:none;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  color:rgba(255,255,255,0.3);
  font-size:20px;
  transition:background 0.15s,color 0.15s,opacity 0.18s;
  z-index:200;
  border-radius:4px;
  outline:none;
  padding:0;
}
.nav-btn:hover{background:rgba(0,0,0,0.6);color:rgba(255,255,255,0.85)}
.nav-btn.hidden{opacity:0;pointer-events:none}
#prevBtn{left:8px}
#nextBtn{right:8px}
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-brand">NOWATCH USA</span>
  <div class="slide-nums" id="slideNums"></div>
</div>

<div class="deck" id="deck"></div>
<button class="nav-btn" id="prevBtn" aria-label="Previous">&#8592;</button>
<button class="nav-btn" id="nextBtn" aria-label="Next">&#8594;</button>

<script>
const SLIDES = [
  {"type":"image","src":"slides/slide-01.png"},
  {"type":"image","src":"slides/slide-02.png"},
  {"type":"image","src":"slides/slide-03.png"},
  {"type":"image","src":"slides/slide-04.png"},
  {"type":"image","src":"slides/slide-05.png"},
  {"type":"image","src":"slides/slide-06.png"},
  {"type":"image","src":"slides/slide-07.png"},
  {"type":"image","src":"slides/slide-08.png"},
  {"type":"image","src":"slides/slide-09.png"},
  {"type":"image","src":"slides/slide-10.png"},
  {"type":"image","src":"slides/slide-11.png"},
  {"type":"image","src":"slides/slide-12.png"},
  {"type":"image","src":"slides/slide-13.png"},
  {"type":"image","src":"slides/slide-14.png"},
  {"type":"image","src":"slides/slide-15.png"},
  {"type":"events"},
  {"type":"image","src":"slides/slide-16.png"},
  {"type":"image","src":"slides/slide-17.png"},
  {"type":"image","src":"slides/slide-18.png"}
];

const TOTAL = SLIDES.length;
let current = 0;
let animating = false;
const deck = document.getElementById('deck');
const slideNumsEl = document.getElementById('slideNums');

// Build slide elements
const slideEls = SLIDES.map((def, i) => {
  const div = document.createElement('div');
  div.className = 'slide';
  if (def.type === 'events') div.classList.add('events-slide');

  if (def.type === 'image') {
    const img = document.createElement('img');
    img.src = def.src;
    img.loading = i < 4 ? 'eager' : 'lazy';
    div.appendChild(img);
  } else {
    const iframe = document.createElement('iframe');
    iframe.src = 'events-timeline.html';
    iframe.scrolling = 'no';
    iframe.setAttribute('frameborder', '0');
    iframe.id = 'events-frame';
    div.appendChild(iframe);
  }

  deck.appendChild(div);
  return div;
});

// Show first slide immediately
slideEls[0].style.display = 'flex';
slideEls[0].style.opacity = '1';

// Build slide number indicators
for (let i = 0; i < TOTAL; i++) {
  const span = document.createElement('span');
  span.className = 'snum' + (i === 0 ? ' active' : '');
  span.textContent = String(i + 1).padStart(2, '0');
  span.title = 'Slide ' + (i + 1) + ' of ' + TOTAL;
  span.addEventListener('click', () => jumpTo(i));
  slideNumsEl.appendChild(span);
}

// Scale events iframe to fit deck area
function scaleEventsFrame() {
  const frame = document.getElementById('events-frame');
  if (!frame) return;
  const deckH = window.innerHeight - 40;
  const scale = Math.min(window.innerWidth / 1600, deckH / 900);
  frame.style.transform = 'scale(' + scale + ')';
}
window.addEventListener('resize', () => {
  scaleEventsFrame();
});

// Transition: rise from bottom + dissolve
function transition(fromIdx, toIdx) {
  if (animating) return;
  animating = true;

  const leaving = slideEls[fromIdx];
  const entering = slideEls[toIdx];

  // Stage entering off-screen-bottom, invisible
  entering.style.transition = 'none';
  entering.style.transform = 'translateY(36px)';
  entering.style.opacity = '0';
  entering.style.display = 'flex';

  // Force reflow so initial state registers
  entering.getBoundingClientRect();

  // Animate: entering rises + fades in, leaving fades out
  entering.style.transition = 'transform 0.30s cubic-bezier(0.0,0.0,0.2,1), opacity 0.26s ease';
  leaving.style.transition  = 'opacity 0.20s ease';

  entering.style.transform = 'translateY(0)';
  entering.style.opacity   = '1';
  leaving.style.opacity    = '0';

  setTimeout(() => {
    leaving.style.display    = 'none';
    leaving.style.opacity    = '';
    leaving.style.transition = '';
    animating = false;
    if (SLIDES[toIdx].type === 'events') scaleEventsFrame();
  }, 320);
}

function navigate(dir) {
  const next = current + dir;
  if (next < 0 || next >= TOTAL || animating) return;
  transition(current, next);
  current = next;
  updateUI();
}

function jumpTo(idx) {
  if (idx === current || animating) return;
  transition(current, idx);
  current = idx;
  updateUI();
}

function updateUI() {
  document.getElementById('prevBtn').className = 'nav-btn' + (current === 0 ? ' hidden' : '');
  document.getElementById('nextBtn').className = 'nav-btn' + (current === TOTAL - 1 ? ' hidden' : '');
  slideNumsEl.querySelectorAll('.snum').forEach((el, i) => {
    el.className = 'snum' + (i === current ? ' active' : '');
  });
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
    e.preventDefault(); navigate(1);
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault(); navigate(-1);
  } else if (e.key === 'f' || e.key === 'F') {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }
});

// Swipe support
let touchStartY = 0;
deck.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, {passive:true});
deck.addEventListener('touchend', e => {
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dy) > 50) navigate(dy < 0 ? 1 : -1);
});

updateUI();
scaleEventsFrame();
</script>
</body>
</html>
