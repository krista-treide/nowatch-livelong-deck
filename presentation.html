<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NOWATCH USA — GTM 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#111;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif}

.deck{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
}

.slide{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#111;
  will-change:transform;
}

.slide img{
  max-width:100vw;
  max-height:100vh;
  object-fit:contain;
  display:block;
  user-select:none;
  -webkit-user-drag:none;
}

.events-slide iframe{
  width:1600px;
  height:900px;
  border:none;
  flex-shrink:0;
  transform-origin:center center;
  display:block;
}

/* ── NAV ARROWS ── */
.nav-btn{
  position:fixed;
  top:50%;
  transform:translateY(-50%);
  width:44px;
  height:80px;
  background:rgba(0,0,0,0.35);
  border:none;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  color:rgba(255,255,255,0.45);
  font-size:22px;
  transition:background 0.15s,color 0.15s,opacity 0.15s;
  z-index:200;
  border-radius:4px;
  outline:none;
  padding:0;
}
.nav-btn:hover{background:rgba(0,0,0,0.65);color:#fff}
.nav-btn.hidden{opacity:0;pointer-events:none}
#prevBtn{left:10px}
#nextBtn{right:10px}

/* ── PROGRESS BAR ── */
.progress{
  position:fixed;
  top:0;left:0;
  height:3px;
  background:#EEFF00;
  transition:width 0.4s cubic-bezier(0.4,0,0.2,1);
  z-index:300;
  pointer-events:none;
}

/* ── SLIDE COUNTER ── */
.counter{
  position:fixed;
  bottom:14px;
  left:50%;
  transform:translateX(-50%);
  font-size:10px;
  letter-spacing:2.5px;
  color:rgba(255,255,255,0.3);
  z-index:200;
  pointer-events:none;
  text-transform:uppercase;
}

/* ── THUMBNAIL STRIP (hover reveal) ── */
.thumbstrip{
  position:fixed;
  bottom:0;left:0;right:0;
  height:72px;
  background:rgba(0,0,0,0.85);
  display:flex;
  align-items:center;
  padding:0 16px;
  gap:6px;
  overflow-x:auto;
  z-index:200;
  transform:translateY(100%);
  transition:transform 0.25s ease;
  scrollbar-width:none;
}
.thumbstrip::-webkit-scrollbar{display:none}
.deck:hover ~ .thumbstrip,
.thumbstrip:hover{transform:translateY(0)}
.thumb{
  flex-shrink:0;
  width:80px;
  height:56px;
  cursor:pointer;
  border-radius:3px;
  overflow:hidden;
  border:2px solid transparent;
  opacity:0.55;
  transition:opacity 0.15s,border-color 0.15s;
  background:#222;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:9px;
  color:#888;
  letter-spacing:1px;
}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb.active{border-color:#EEFF00;opacity:1}
.thumb:hover{opacity:0.9}
</style>
</head>
<body>

<div class="progress" id="progress"></div>
<div class="deck" id="deck"></div>
<button class="nav-btn" id="prevBtn" aria-label="Previous">&#8592;</button>
<button class="nav-btn" id="nextBtn" aria-label="Next">&#8594;</button>
<div class="counter" id="counter"></div>
<div class="thumbstrip" id="thumbstrip"></div>

<script>
const SLIDES = [
  {"type":"image","src":"slides/slide-01.png"},
  {"type":"image","src":"slides/slide-02.png"},
  {"type":"image","src":"slides/slide-03.png"},
  {"type":"image","src":"slides/slide-04.png"},
  {"type":"image","src":"slides/slide-05.png"},
  {"type":"image","src":"slides/slide-06.png"},
  {"type":"image","src":"slides/slide-07.png"},
  {"type":"image","src":"slides/slide-08.png"},
  {"type":"image","src":"slides/slide-09.png"},
  {"type":"image","src":"slides/slide-10.png"},
  {"type":"image","src":"slides/slide-11.png"},
  {"type":"image","src":"slides/slide-12.png"},
  {"type":"image","src":"slides/slide-13.png"},
  {"type":"image","src":"slides/slide-14.png"},
  {"type":"image","src":"slides/slide-15.png"},
  {"type":"events"},
  {"type":"image","src":"slides/slide-16.png"},
  {"type":"image","src":"slides/slide-17.png"},
  {"type":"image","src":"slides/slide-18.png"}
];

const TOTAL = SLIDES.length;
let current = 0;
let animating = false;
const deck = document.getElementById('deck');
const thumbstrip = document.getElementById('thumbstrip');

// Build slide elements
const slideEls = SLIDES.map((def, i) => {
  const div = document.createElement('div');
  div.className = 'slide';
  div.dataset.index = i;

  if (def.type === 'image') {
    const img = document.createElement('img');
    img.src = def.src;
    img.loading = i < 3 ? 'eager' : 'lazy';
    div.appendChild(img);
  } else {
    div.classList.add('events-slide');
    const iframe = document.createElement('iframe');
    iframe.src = 'events-timeline.html';
    iframe.scrolling = 'no';
    iframe.setAttribute('frameborder', '0');
    iframe.id = 'events-frame';
    div.appendChild(iframe);
  }

  // Initial positions
  div.style.transition = 'none';
  div.style.transform = i === 0 ? 'translateX(0)' : 'translateX(100%)';
  if (i > 1) div.style.display = 'none';

  deck.appendChild(div);

  // Thumbnail
  const thumb = document.createElement('div');
  thumb.className = 'thumb' + (i === 0 ? ' active' : '');
  thumb.dataset.index = i;
  thumb.title = 'Slide ' + (i + 1);
  thumb.onclick = () => jumpTo(i);
  if (def.type === 'image') {
    const timg = document.createElement('img');
    timg.src = def.src;
    timg.loading = 'lazy';
    thumb.appendChild(timg);
  } else {
    thumb.textContent = 'EVENTS';
  }
  thumbstrip.appendChild(thumb);

  return div;
});

// Scale the events iframe to fit viewport
function scaleEventsFrame() {
  const frame = document.getElementById('events-frame');
  if (!frame) return;
  const scale = Math.min(window.innerWidth / 1600, window.innerHeight / 900);
  frame.style.transform = 'scale(' + scale + ')';
}
window.addEventListener('resize', scaleEventsFrame);
setTimeout(scaleEventsFrame, 100);

// Animate transition
function transition(fromIdx, toIdx, dir) {
  if (animating) return;
  animating = true;

  const leaving = slideEls[fromIdx];
  const entering = slideEls[toIdx];

  entering.style.display = 'flex';
  entering.style.transition = 'none';
  entering.style.transform = 'translateX(' + (dir > 0 ? '100%' : '-100%') + ')';
  entering.getBoundingClientRect(); // force reflow

  const ease = 'transform 0.42s cubic-bezier(0.4,0,0.2,1)';
  leaving.style.transition = ease;
  entering.style.transition = ease;
  leaving.style.transform = 'translateX(' + (dir > 0 ? '-100%' : '100%') + ')';
  entering.style.transform = 'translateX(0)';

  // Preload next
  const preload = toIdx + dir;
  if (preload >= 0 && preload < TOTAL && slideEls[preload].style.display === 'none') {
    slideEls[preload].style.display = 'flex';
    slideEls[preload].style.transition = 'none';
    slideEls[preload].style.transform = 'translateX(' + (dir > 0 ? '100%' : '-100%') + ')';
  }

  setTimeout(() => {
    leaving.style.display = 'none';
    leaving.style.transition = '';
    animating = false;
    if (slideEls[toIdx].querySelector('#events-frame')) scaleEventsFrame();
  }, 430);
}

function navigate(dir) {
  const next = current + dir;
  if (next < 0 || next >= TOTAL || animating) return;
  transition(current, next, dir);
  current = next;
  updateUI();
}

function jumpTo(idx) {
  if (idx === current || animating) return;
  const dir = idx > current ? 1 : -1;
  transition(current, idx, dir);
  current = idx;
  updateUI();
}

function updateUI() {
  document.getElementById('counter').textContent = (current + 1) + ' • ' + TOTAL;
  document.getElementById('progress').style.width = (((current + 1) / TOTAL) * 100) + '%';
  document.getElementById('prevBtn').className = 'nav-btn' + (current === 0 ? ' hidden' : '');
  document.getElementById('nextBtn').className = 'nav-btn' + (current === TOTAL - 1 ? ' hidden' : '');
  document.querySelectorAll('.thumb').forEach((t, i) => {
    t.className = 'thumb' + (i === current ? ' active' : '');
  });
  // Scroll thumbnail into view
  const activeThumb = thumbstrip.children[current];
  if (activeThumb) activeThumb.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); navigate(1); }
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); navigate(-1); }
  else if (e.key === 'f' || e.key === 'F') {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }
});

// Click/swipe on deck to advance
let touchStartX = 0;
deck.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive:true});
deck.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) navigate(dx < 0 ? 1 : -1);
});

updateUI();
</script>
</body>
</html>
